sequences:
  onboarding:
    total_emails: 7
    campaign_type: "onboarding"
    description: "Welcome sequence for new Phoenix members"
    emails:
      - step: 1
        tone: "warm, welcoming"
        purpose: "Welcome + community intro"
        cta: "Explore Path of the Phoenix"
        key_messages:
          - "alignment"
          - "renewal"
          - "conscious evolution"
        length: "short"

      - step: 2
        tone: "educational, aspirational"
        purpose: "How OHM works - frequency-based therapy introduction"
        cta: "Learn about our approach"
        key_messages:
          - "frequency-based EMF longevity therapy"
          - "scientific foundation"
          - "universal harmony"
        length: "medium"

      - step: 3
        tone: "social proof, aspirational"
        purpose: "Member stories and testimonials"
        cta: "Read member experiences"
        key_messages:
          - "community of conscious seekers"
          - "real transformation"
          - "alignment through practice"
        length: "medium"

      - step: 4
        tone: "practical, inviting"
        purpose: "Getting started guide"
        cta: "Start your first session"
        key_messages:
          - "ease of use"
          - "guided experience"
          - "personalized path"
        length: "medium"

      - step: 5
        tone: "educational, mystical"
